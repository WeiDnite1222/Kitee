name: Build Development Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - dev-1.0
    paths:
      - '.github/workflows/dev-1.0.yml'
      - 'build.py'
      - 'build.sh'
      - 'pyproject.toml'
      - 'kitee_launcher/**'
  pull_request:
    branches:
      - dev-1.0
    paths:
      - '.github/workflows/dev-1.0.yml'
      - 'build.py'
      - 'build.sh'
      - 'pyproject.toml'
      - 'kitee_launcher/**'

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev-1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -e .

      - name: Build Kitee for Windows
        run: |
          python build.py

      - name: Compress Windows build
        run: |
          Compress-Archive -Path build\Kitee -DestinationPath Kitee-1.0-dev.Windows.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Kitee-1.0-dev.Windows
          path: Kitee-1.0-dev.Windows.zip

  macos-arm64e-build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev-1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -e .

      - name: Build Kitee for macOS
        run: |
          python build.py

      - name: Compress macOS ARM64 build
        run: |
          cd build && zip -r ../Kitee-1.0-dev.macOS.arm64e.zip Kitee

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Kitee-1.0-dev.macOS.arm64e
          path: Kitee-1.0-dev.macOS.arm64e.zip

  macos-x64-build:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev-1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -e .

      - name: Build Kitee for macOS
        run: |
          python build.py

      - name: Compress macOS x64 build
        run: |
          cd build && zip -r ../Kitee-1.0-dev.macOS.x64.zip Kitee

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Kitee-1.0-dev.macOS.x64
          path: Kitee-1.0-dev.macOS.x64.zip

  linux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev-1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -e .

      - name: Build Kitee for Linux
        run: |
          python build.py

      - name: Compress Linux build
        run: |
          cd build && zip -r ../Kitee-1.0-dev.Linux.zip Kitee

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Kitee-1.0-dev.Linux
          path: Kitee-1.0-dev.Linux.zip

  create-latest-tag:
    runs-on: ubuntu-latest
    needs: [windows-build, macos-arm64e-build, macos-x64-build, linux-build]
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev-1.0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Create and push 'Latest' tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f Latest
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} Latest --force


